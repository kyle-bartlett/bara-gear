<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!--
    Landing Page Hero Mockup
    =========================
    Purpose: Replace placeholder product cards on Scout's pre-launch landing page
    Size: 1200x600 (hero banner, 2x retina = 600px CSS width)
    Shows: 3 hero products arranged as editorial flat lay on dark background
    Requested by: Blaze (landing page visual), Scout (placeholder replacement)
  -->

  <rect width="1200" height="600" fill="#0D0D0D"/>

  <defs>
    <pattern id="hero-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none"/>
      <line x1="0" y1="60" x2="60" y2="60" stroke="#141414" stroke-width="0.5"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#141414" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="hero-vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0D0D0D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#hero-grid)"/>
  <rect width="1200" height="600" fill="url(#hero-vignette)"/>

  <!-- Product 1: Hoodie (left, slightly rotated) -->
  <g transform="translate(60, 50) rotate(-5, 200, 250)">
    <rect x="40" y="80" width="280" height="340" rx="8" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <path d="M 80,80 Q 80,20 180,10 Q 280,20 280,80" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <ellipse cx="180" cy="65" rx="55" ry="20" fill="#151515" stroke="#2A2A2A" stroke-width="0.5"/>
    <rect x="-10" y="95" width="70" height="170" rx="5" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1" transform="rotate(-12, 40, 180)"/>
    <rect x="300" y="95" width="70" height="170" rx="5" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1" transform="rotate(12, 320, 180)"/>
    <!-- Print -->
    <text x="75" y="140" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#00FF41">Compile.</text>
    <text x="75" y="158" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#00FF41">Deploy.</text>
    <text x="75" y="176" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#00FF41">Summit.</text>
    <path d="M 110,310 Q 180,335 250,310" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
  </g>

  <!-- Product 2: Tee (center, flat) -->
  <g transform="translate(400, 30)">
    <rect x="50" y="80" width="300" height="380" rx="6" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <path d="M 50,80 L -10,115 L -10,200 L 50,170" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <path d="M 350,80 L 410,115 L 410,200 L 350,170" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <ellipse cx="200" cy="80" rx="60" ry="20" fill="#151515" stroke="#2A2A2A" stroke-width="0.5"/>
    <!-- 404 print -->
    <text x="200" y="160" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#555555" letter-spacing="2">HTTP/1.1</text>
    <text x="200" y="260" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="64" font-weight="700" fill="#FFFFFF">404</text>
    <text x="200" y="295" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#CCCCCC" letter-spacing="3">Trail Not Found</text>
  </g>

  <!-- Product 3: Crewneck (right, slightly rotated other way) -->
  <g transform="translate(800, 60) rotate(4, 180, 240)">
    <rect x="30" y="70" width="280" height="340" rx="8" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1"/>
    <ellipse cx="170" cy="75" rx="55" ry="18" fill="#151515" stroke="#2A2A2A" stroke-width="0.5"/>
    <rect x="-20" y="85" width="70" height="170" rx="5" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1" transform="rotate(-10, 30, 170)"/>
    <rect x="290" y="85" width="70" height="170" rx="5" fill="#1F1F1F" stroke="#2A2A2A" stroke-width="1" transform="rotate(10, 310, 170)"/>
    <!-- Elevation profile chart -->
    <g transform="translate(55, 130)">
      <polyline points="0,120 30,100 60,110 90,80 120,95 150,50 180,70 210,40 230,55" fill="none" stroke="#00FF41" stroke-width="2"/>
      <circle cx="0" cy="120" r="3" fill="#00FF41"/>
      <circle cx="90" cy="80" r="3" fill="#00FF41"/>
      <circle cx="150" cy="50" r="3" fill="#00FF41"/>
      <circle cx="210" cy="40" r="4" fill="#00FF41"/>
    </g>
  </g>

  <!-- Accessories scattered (small details) -->
  <!-- Enamel pin (bottom center-left) -->
  <g transform="translate(350, 480)">
    <circle cx="20" cy="20" r="18" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1.5"/>
    <polygon points="20,8 14,26 26,26" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="0.8" opacity="0.7"/>
    <rect x="18" y="5" width="4" height="8" fill="#00FF41" rx="0.5"/>
  </g>

  <!-- Stickers (bottom right area) -->
  <g transform="translate(880, 490) rotate(-8)">
    <rect width="60" height="60" rx="8" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>
    <text x="30" y="35" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="2">BARA</text>
    <rect x="50" y="26" width="3" height="10" fill="#00FF41" rx="0.5"/>
  </g>

  <!-- Overlay: collection name -->
  <text x="600" y="570" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#444444" letter-spacing="6">DROP 0 — "HELLO, WORLD."</text>
</svg>