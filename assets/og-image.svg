<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    OG Social Sharing Image
    ========================
    Purpose: Open Graph preview for Twitter/LinkedIn/Facebook cards
    Size: 1200x630 (standard OG image)
    Scene: Clean brand showcase — BARA wordmark, hero hoodie silhouette,
           mountain range backdrop, tagline. Optimized for small previews.
    Mood: Bold, clear, instantly recognizable
    For: Scout (landing page og:image meta tag), all social link sharing
    Ref: landing/index.html meta og:image → https://wearbara.com/assets/og-image.jpg
  -->

  <defs>
    <!-- Background gradient -->
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>

    <!-- Mountain range atmosphere -->
    <linearGradient id="og-range" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>

    <!-- Terminal Green glow behind wordmark -->
    <radialGradient id="og-glow" cx="0.5" cy="0.42" r="0.25">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom fade -->
    <linearGradient id="og-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle grid (brand texture) -->
  <g opacity="0.04">
    <line x1="120" y1="0" x2="120" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#333" stroke-width="0.5"/>
  </g>

  <!-- Mountain range silhouette (backdrop — subtle) -->
  <polygon points="0,420 60,370 130,395 200,340 280,370 360,310 440,355 520,300 580,340 660,290 740,330 810,295 880,340 960,310 1030,355 1100,325 1170,360 1200,340 1200,460 0,460"
           fill="#0F0F14" opacity="0.7"/>

  <polygon points="0,450 80,400 160,430 230,380 320,410 400,360 480,400 550,370 630,400 710,350 790,385 860,360 940,395 1020,370 1100,405 1200,380 1200,470 0,470"
           fill="#0C0C10" opacity="0.85"/>

  <!-- Ground plane -->
  <rect x="0" y="460" width="1200" height="170" fill="#0B0B0B"/>

  <!-- Green glow -->
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- === HERO HOODIE SILHOUETTE (left of center) === -->
  <g transform="translate(340, 180)">
    <!-- Folded hoodie body -->
    <rect x="0" y="30" width="200" height="140" rx="8" fill="#1A1A1A" stroke="#252525" stroke-width="0.8"/>
    <!-- Fold crease -->
    <line x1="0" y1="80" x2="200" y2="80" stroke="#222222" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#222222" stroke-width="0.5"/>
    <!-- Hood -->
    <path d="M 40,30 Q 40,0 100,-10 Q 160,0 160,30"
          fill="#1A1A1A" stroke="#252525" stroke-width="0.5"/>
    <!-- Drawstrings -->
    <line x1="85" y1="30" x2="80" y2="55" stroke="#2A2A2A" stroke-width="0.8"/>
    <line x1="115" y1="30" x2="120" y2="55" stroke="#2A2A2A" stroke-width="0.8"/>
    <circle cx="80" cy="56" r="2" fill="#2A2A2A"/>
    <circle cx="120" cy="56" r="2" fill="#2A2A2A"/>
    <!-- Left chest design -->
    <g transform="translate(15, 40)">
      <text font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#00FF41" opacity="0.7">Compile.</text>
      <text y="12" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#00FF41" opacity="0.7">Deploy.</text>
      <text y="24" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#00FF41" opacity="0.7">Summit.</text>
    </g>
    <!-- Pocket -->
    <rect x="55" y="85" width="90" height="30" rx="3" fill="none" stroke="#222222" stroke-width="0.5"/>
    <!-- BARA label -->
    <g transform="translate(175, 35)">
      <rect width="22" height="10" rx="1" fill="#0D0D0D" stroke="#1A1A1A" stroke-width="0.3"/>
      <text x="3" y="7" font-family="'JetBrains Mono', monospace" font-size="4" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">BARA</text>
      <rect x="18" y="2" width="1.5" height="5" fill="#00FF41" rx="0.3"/>
    </g>
  </g>

  <!-- === 404 TEE (right of hoodie, slightly behind) === -->
  <g transform="translate(570, 210)" opacity="0.7">
    <!-- Folded tee -->
    <rect x="0" y="15" width="150" height="110" rx="6" fill="#161616" stroke="#222222" stroke-width="0.5"/>
    <!-- Fold crease -->
    <line x1="0" y1="60" x2="150" y2="60" stroke="#1E1E1E" stroke-width="0.5"/>
    <!-- Collar -->
    <path d="M 35,15 Q 35,5 75,0 Q 115,5 115,15" fill="#161616" stroke="#222222" stroke-width="0.3"/>
    <!-- 404 design -->
    <text x="75" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#FFFFFF" opacity="0.2">404</text>
    <text x="75" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="5" fill="#CCCCCC" opacity="0.12" letter-spacing="1">Trail Not Found</text>
  </g>

  <!-- === ENAMEL PIN (bottom left accent) === -->
  <g transform="translate(280, 380)">
    <circle cx="18" cy="18" r="17" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
    <polygon points="18,8 10,24 26,24" fill="#FFFFFF" opacity="0.6"/>
    <rect x="16" y="5" width="3" height="8" fill="#00FF41" rx="0.5" opacity="0.7"/>
  </g>

  <!-- === STICKER (between products) === -->
  <g transform="translate(740, 300) rotate(8)">
    <rect width="50" height="50" rx="8" fill="#0D0D0D" stroke="#222222" stroke-width="0.8"/>
    <text x="25" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">BARA</text>
    <rect x="41" y="20" width="2" height="9" fill="#00FF41" rx="0.5"/>
    <!-- Peel corner -->
    <path d="M 40,50 Q 50,50 50,40" fill="#161616" stroke="#1E1E1E" stroke-width="0.3"/>
  </g>

  <!-- === CARABINER (accent, right side) === -->
  <g transform="translate(810, 340) rotate(-15)">
    <path d="M 6,0 Q 0,0 0,10 L 0,30 Q 0,40 6,40 L 18,40 Q 24,40 24,30 L 24,10 Q 24,0 18,0 Z"
          fill="none" stroke="#00FF41" stroke-width="2" opacity="0.45"/>
    <line x1="24" y1="10" x2="24" y2="25" stroke="#00FF41" stroke-width="1.5" opacity="0.5"/>
    <circle cx="24" cy="10" r="1.5" fill="#00FF41" opacity="0.35"/>
  </g>

  <!-- Bottom fade overlay -->
  <rect x="0" y="460" width="1200" height="170" fill="url(#og-bottom)"/>

  <!-- === BARA WORDMARK (centered, prominent) === -->
  <g transform="translate(600, 520)">
    <text text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="12">BARA</text>
    <rect x="50" y="-36" width="6" height="42" fill="#00FF41" rx="1"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="570" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#555555" letter-spacing="6">WHERE CODE MEETS ALTITUDE</text>

  <!-- Drop identifier -->
  <text x="600" y="600" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#333333" letter-spacing="4">DROP 0 — HELLO, WORLD.</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#00FF41" opacity="0.15"/>

  <!-- Bottom accent line -->
  <rect x="0" y="628" width="1200" height="2" fill="#00FF41" opacity="0.15"/>
</svg>