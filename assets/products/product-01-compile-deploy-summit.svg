<?xml version="1.0" encoding="UTF-8"?>
<!--
  BARA Product Render — Design 1: "Compile. Deploy. Summit."
  Format: Twitter (1200x675)
  View: Hoodie front — left chest placement
  For: Monday Design Reveal — Slide 1 / Twitter hero
  Creative Director: Pixel | 2026-03-30
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    </style>
    <radialGradient id="spotlight" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fabric-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="30%" stop-color="#1A1A1A"/>
      <stop offset="70%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
  </defs>

  <!-- Background — deep black with subtle vignette -->
  <rect width="1200" height="675" fill="#0A0A0A"/>
  <rect width="1200" height="675" fill="url(#spotlight)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#111111" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#111111" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.3"/>

  <!-- Hoodie silhouette — centered, presentation-ready -->
  <g transform="translate(370, 30) scale(0.78)">
    <!-- Hoodie body with fabric gradient -->
    <path d="
      M 200,10
      L 150,10 C 130,10 110,20 100,40 L 30,100 L -10,170 L 60,210 L 110,150
      L 110,550 L 500,550 L 500,150 L 550,210 L 620,170 L 580,100
      L 510,40 C 500,20 480,10 460,10 L 410,10
      C 390,30 360,50 305,50 C 250,50 220,30 200,10 Z
    " fill="url(#fabric-sheen)" stroke="#252525" stroke-width="1"/>

    <!-- Hood -->
    <path d="
      M 200,10 C 180,-10 170,-40 175,-70 C 180,-100 200,-120 240,-130
      C 270,-135 300,-135 330,-130
      C 370,-120 390,-100 395,-70 C 400,-40 390,-10 410,10
    " fill="#1C1C1C" stroke="#252525" stroke-width="1"/>
    <path d="
      M 210,5 C 195,-10 188,-35 192,-60 C 196,-85 210,-100 240,-108
      C 265,-113 300,-113 330,-108
      C 360,-100 374,-85 378,-60 C 382,-35 375,-10 400,5
    " fill="none" stroke="#222222" stroke-width="0.8"/>

    <!-- Kangaroo pocket -->
    <path d="M 170,330 L 170,420 C 170,440 190,450 210,450 L 400,450 C 420,450 440,440 440,420 L 440,330"
          fill="none" stroke="#222222" stroke-width="0.8"/>

    <!-- Center seam -->
    <line x1="305" y1="50" x2="305" y2="330" stroke="#222222" stroke-width="0.6"/>

    <!-- Sleeve fold shadows -->
    <path d="M 110,200 L 110,350" stroke="#161616" stroke-width="8" opacity="0.3"/>
    <path d="M 500,200 L 500,350" stroke="#161616" stroke-width="8" opacity="0.3"/>

    <!-- === DESIGN: Left chest — "Compile. Deploy. Summit." inline === -->
    <text x="150" y="145" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="14.5" fill="#00FF41" letter-spacing="0.5">Compile. Deploy. Summit.</text>
  </g>

  <!-- BARA wordmark — bottom right -->
  <text x="1120" y="630" text-anchor="end" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="18" fill="#F5F5F5" letter-spacing="4" opacity="0.8">BARA</text>

  <!-- Subtle tagline -->
  <text x="1120" y="650" text-anchor="end" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#555555" letter-spacing="1">Drop 0: "Hello, World"</text>

  <!-- Design name — left side -->
  <text x="50" y="630" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="14" fill="#00FF41" opacity="0.7">01</text>
  <text x="80" y="630" font-family="'Inter', sans-serif" font-weight="500" font-size="13" fill="#888888">Compile. Deploy. Summit.</text>
  <text x="50" y="650" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#555555">400gsm French Terry / Carbon Black / Terminal Green</text>
</svg>
