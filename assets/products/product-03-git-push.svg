<?xml version="1.0" encoding="UTF-8"?>
<!--
  BARA Product Render — Design 3: "git push origin summit"
  Format: Twitter (1200x675)
  View: Tee + crewneck side by side — two colorways
  Creative Director: Pixel | 2026-03-30
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    </style>
    <linearGradient id="fabric-black" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="fabric-charcoal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#484848"/>
      <stop offset="50%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="#0A0A0A"/>

  <!-- Grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="40" y1="0" x2="40" y2="40" stroke="#111111" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#111111" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.25"/>

  <!-- LEFT: Tee — Terminal Green on Carbon Black -->
  <g transform="translate(100, 40) scale(0.65)">
    <path d="
      M 200,0 L 160,0 C 140,0 120,10 110,30 L 40,80 L 0,140 L 60,180 L 110,130
      L 110,500 L 500,500 L 500,130 L 550,180 L 610,140 L 570,80
      L 500,30 C 490,10 470,0 450,0 L 410,0
      C 390,20 360,35 305,35 C 250,35 220,20 200,0 Z
    " fill="url(#fabric-black)" stroke="#252525" stroke-width="1.2"/>
    <path d="M 200,0 C 220,20 250,35 305,35 C 360,35 390,20 410,0" fill="none" stroke="#252525" stroke-width="1.5"/>

    <!-- Left chest text -->
    <text x="155" y="130" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="13" fill="#00FF41" letter-spacing="0.3">git push origin summit</text>

    <!-- Fold shadows -->
    <path d="M 110,180 L 110,380" stroke="#141414" stroke-width="8" opacity="0.2"/>
    <path d="M 500,180 L 500,380" stroke="#141414" stroke-width="8" opacity="0.2"/>
  </g>

  <!-- Colorway label left -->
  <text x="275" y="420" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#666666">Terminal Green on Carbon Black</text>

  <!-- RIGHT: Crewneck — Snow White on Heather Charcoal -->
  <g transform="translate(610, 30) scale(0.65)">
    <!-- Crewneck silhouette (no hood) -->
    <path d="
      M 200,0 L 160,0 C 140,0 120,10 110,30 L 40,80 L 0,140 L 60,180 L 110,130
      L 110,500 L 500,500 L 500,130 L 550,180 L 610,140 L 570,80
      L 500,30 C 490,10 470,0 450,0 L 410,0
      C 390,20 360,35 305,35 C 250,35 220,20 200,0 Z
    " fill="url(#fabric-charcoal)" stroke="#4A4A4A" stroke-width="1.2"/>
    <path d="M 200,0 C 220,20 250,35 305,35 C 360,35 390,20 410,0" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>

    <!-- Ribbed collar detail -->
    <path d="M 195,-4 C 215,16 250,30 305,30 C 360,30 395,16 415,-4" fill="none" stroke="#555555" stroke-width="0.8"/>

    <!-- Left chest text -->
    <text x="155" y="130" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="13" fill="#FAFAFA" letter-spacing="0.3">git push origin summit</text>

    <!-- Fold shadows -->
    <path d="M 110,180 L 110,380" stroke="#2F2F2F" stroke-width="8" opacity="0.2"/>
    <path d="M 500,180 L 500,380" stroke="#2F2F2F" stroke-width="8" opacity="0.2"/>
  </g>

  <!-- Colorway label right -->
  <text x="810" y="420" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#666666">Snow White on Heather Charcoal</text>

  <!-- "VS" divider -->
  <line x1="600" y1="80" x2="600" y2="380" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="6,6"/>

  <!-- Bottom info -->
  <text x="50" y="560" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="14" fill="#00FF41" opacity="0.7">03</text>
  <text x="80" y="560" font-family="'Inter', sans-serif" font-weight="500" font-size="13" fill="#888888">git push origin summit</text>
  <text x="50" y="582" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#555555">Left chest only / Two colorways / The subtle flex</text>

  <text x="1120" y="630" text-anchor="end" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="18" fill="#F5F5F5" letter-spacing="4" opacity="0.8">BARA</text>
  <text x="1120" y="650" text-anchor="end" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#555555">Drop 0: "Hello, World"</text>
</svg>
