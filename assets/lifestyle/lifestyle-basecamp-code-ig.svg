<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!--
    Lifestyle Mockup: "Basecamp Code"
    ==================================
    Purpose: Social square (Instagram/Twitter)
    Size: 1080x1080
    Scene: Campsite at dusk — tent, campfire glow, person in BARA tee
           working on laptop. Mountains behind. The crossover life.
    Mood: Warm, intimate, the "both worlds" moment
    For: Blaze (social content), landing page gallery
  -->

  <defs>
    <!-- Night sky -->
    <linearGradient id="bc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080C18"/>
      <stop offset="60%" stop-color="#0D1320"/>
      <stop offset="100%" stop-color="#151A28"/>
    </linearGradient>

    <!-- Campfire glow — warm radial -->
    <radialGradient id="fire-glow" cx="0.35" cy="0.75" r="0.35">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.12"/>
      <stop offset="30%" stop-color="#FF6B35" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>

    <!-- Laptop screen glow -->
    <radialGradient id="screen-glow" cx="0.65" cy="0.68" r="0.15">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>

    <!-- Ground -->
    <linearGradient id="bc-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1080" height="1080" fill="url(#bc-sky)"/>

  <!-- Stars -->
  <g opacity="0.5">
    <circle cx="80" cy="50" r="1" fill="#FFFFFF"/>
    <circle cx="200" cy="90" r="0.7" fill="#FFFFFF"/>
    <circle cx="350" cy="35" r="1.2" fill="#FFFFFF"/>
    <circle cx="500" cy="70" r="0.8" fill="#FFFFFF"/>
    <circle cx="650" cy="45" r="1" fill="#FFFFFF"/>
    <circle cx="780" cy="100" r="0.6" fill="#FFFFFF"/>
    <circle cx="900" cy="60" r="0.9" fill="#FFFFFF"/>
    <circle cx="1020" cy="85" r="0.7" fill="#FFFFFF"/>
    <circle cx="150" cy="150" r="0.5" fill="#FFFFFF"/>
    <circle cx="420" cy="130" r="0.8" fill="#FFFFFF"/>
    <circle cx="700" cy="120" r="0.6" fill="#FFFFFF"/>
    <circle cx="950" cy="140" r="0.9" fill="#FFFFFF"/>
    <circle cx="300" cy="180" r="0.4" fill="#FFFFFF"/>
    <circle cx="830" cy="170" r="0.6" fill="#FFFFFF"/>
  </g>

  <!-- Mountain range backdrop -->
  <polygon points="0,420 80,340 170,380 240,310 330,360 420,290 500,340 570,300 650,350 730,280 810,330 880,300 960,360 1040,320 1080,350 1080,420"
           fill="#0E1118" opacity="0.9"/>

  <!-- Treeline silhouette -->
  <g fill="#0C0F14" opacity="0.95">
    <polygon points="0,440 20,390 35,440"/>
    <polygon points="30,440 55,380 75,440"/>
    <polygon points="70,440 95,370 115,440"/>
    <polygon points="120,440 140,395 160,440"/>
    <polygon points="180,440 200,360 220,440"/>
    <polygon points="230,440 250,385 270,440"/>
    <polygon points="280,440 305,370 325,440"/>
    <polygon points="340,440 360,390 380,440"/>
    <polygon points="400,440 420,375 440,440"/>
    <polygon points="460,440 480,395 500,440"/>
    <polygon points="520,440 540,365 560,440"/>
    <polygon points="580,440 600,390 620,440"/>
    <polygon points="640,440 660,380 680,440"/>
    <polygon points="700,440 720,395 740,440"/>
    <polygon points="760,440 780,370 800,440"/>
    <polygon points="820,440 840,385 860,440"/>
    <polygon points="880,440 905,375 925,440"/>
    <polygon points="940,440 960,390 980,440"/>
    <polygon points="1000,440 1020,380 1040,440"/>
    <polygon points="1050,440 1070,395 1080,440"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="440" width="1080" height="640" fill="url(#bc-ground)"/>

  <!-- Campfire glow overlay -->
  <rect width="1080" height="1080" fill="url(#fire-glow)"/>
  <rect width="1080" height="1080" fill="url(#screen-glow)"/>

  <!-- === TENT (left side) === -->
  <g transform="translate(80, 430)">
    <!-- Tent body — A-frame style -->
    <polygon points="0,180 150,-20 300,180" fill="#181818" stroke="#252525" stroke-width="1"/>
    <!-- Tent opening (darker) -->
    <polygon points="100,180 150,40 200,180" fill="#0D0D0D" stroke="#222222" stroke-width="0.5"/>
    <!-- Guy lines -->
    <line x1="150" y1="-20" x2="320" y2="50" stroke="#333333" stroke-width="0.5" opacity="0.4"/>
    <line x1="150" y1="-20" x2="-20" y2="50" stroke="#333333" stroke-width="0.5" opacity="0.4"/>
    <!-- Ridge seam -->
    <line x1="150" y1="-20" x2="150" y2="40" stroke="#252525" stroke-width="0.5"/>
  </g>

  <!-- === CAMPFIRE (center-left) === -->
  <g transform="translate(320, 730)">
    <!-- Fire ring stones -->
    <g fill="#2A2A2A" opacity="0.6">
      <ellipse cx="-20" cy="15" rx="10" ry="7"/>
      <ellipse cx="0" cy="20" rx="9" ry="7"/>
      <ellipse cx="22" cy="18" rx="10" ry="6"/>
      <ellipse cx="42" cy="14" rx="9" ry="7"/>
      <ellipse cx="58" cy="18" rx="10" ry="6"/>
      <ellipse cx="-15" cy="-5" rx="8" ry="6"/>
      <ellipse cx="55" cy="-2" rx="9" ry="6"/>
    </g>
    <!-- Burning logs -->
    <rect x="-5" y="-5" width="50" height="8" rx="3" fill="#1A0800" transform="rotate(-15, 20, 0)"/>
    <rect x="5" y="-8" width="45" height="7" rx="3" fill="#1A0800" transform="rotate(20, 25, -5)"/>
    <!-- Flames (subtle warm glow shapes) -->
    <g opacity="0.6">
      <polygon points="15,-25 20,-5 10,-5" fill="#FF6B35" opacity="0.5"/>
      <polygon points="25,-30 30,-5 20,-5" fill="#FF8C42" opacity="0.4"/>
      <polygon points="30,-20 35,-5 25,-5" fill="#FF6B35" opacity="0.3"/>
      <polygon points="12,-18 16,-5 8,-5" fill="#FFB366" opacity="0.3"/>
    </g>
    <!-- Embers -->
    <circle cx="5" cy="-12" r="1.5" fill="#FF6B35" opacity="0.4"/>
    <circle cx="35" cy="-15" r="1" fill="#FF8C42" opacity="0.3"/>
    <circle cx="20" cy="-35" r="0.8" fill="#FF6B35" opacity="0.2"/>
  </g>

  <!-- === PERSON sitting, wearing BARA tee, laptop open === -->
  <g transform="translate(580, 520)">
    <!-- Seated legs (crossed / extended) -->
    <rect x="20" y="180" width="80" height="20" rx="6" fill="#111111"/>
    <rect x="-10" y="170" width="70" height="18" rx="6" fill="#111111" transform="rotate(-8, 25, 180)"/>

    <!-- BARA Tee (body) — slightly lit by fire on left, screen on right -->
    <rect x="15" y="60" width="70" height="120" rx="4" fill="#181818" stroke="#232323" stroke-width="0.5"/>

    <!-- Tee sleeves -->
    <rect x="-8" y="65" width="30" height="40" rx="4" fill="#181818" stroke="#232323" stroke-width="0.5" transform="rotate(-10, 5, 85)"/>
    <rect x="78" y="65" width="30" height="40" rx="4" fill="#181818" stroke="#232323" stroke-width="0.5" transform="rotate(10, 95, 85)"/>

    <!-- Tee neckline -->
    <ellipse cx="50" cy="62" rx="20" ry="8" fill="#111111" stroke="#232323" stroke-width="0.3"/>

    <!-- Head -->
    <ellipse cx="50" cy="38" rx="18" ry="22" fill="#111111"/>

    <!-- 404 design on tee (visible by firelight) -->
    <text x="50" y="115" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#FFFFFF" opacity="0.15">404</text>
    <text x="50" y="130" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="5" fill="#CCCCCC" opacity="0.1" letter-spacing="1">Trail Not Found</text>

    <!-- Arms reaching to laptop -->
    <line x1="5" y1="90" x2="-30" y2="155" stroke="#181818" stroke-width="14" stroke-linecap="round"/>
    <line x1="95" y1="90" x2="120" y2="155" stroke="#181818" stroke-width="14" stroke-linecap="round"/>

    <!-- Hands on keyboard area -->
    <circle cx="-28" cy="158" r="6" fill="#111111"/>
    <circle cx="118" cy="158" r="6" fill="#111111"/>
  </g>

  <!-- === LAPTOP === -->
  <g transform="translate(520, 660)">
    <!-- Laptop base -->
    <rect x="0" y="30" width="120" height="8" rx="2" fill="#222222" stroke="#2A2A2A" stroke-width="0.5"/>
    <!-- Laptop screen -->
    <rect x="10" y="-50" width="100" height="80" rx="3" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="0.8"/>
    <!-- Screen content — code lines (Terminal Green glow) -->
    <g transform="translate(18, -42)" opacity="0.7">
      <rect width="60" height="2" fill="#00FF41" opacity="0.6" rx="0.5"/>
      <rect y="6" width="45" height="2" fill="#00FF41" opacity="0.4" rx="0.5"/>
      <rect y="12" width="70" height="2" fill="#00FF41" opacity="0.5" rx="0.5"/>
      <rect y="18" width="35" height="2" fill="#00FF41" opacity="0.3" rx="0.5"/>
      <rect y="24" width="55" height="2" fill="#00FF41" opacity="0.5" rx="0.5"/>
      <rect y="30" width="40" height="2" fill="#00FF41" opacity="0.4" rx="0.5"/>
      <rect y="36" width="65" height="2" fill="#00FF41" opacity="0.6" rx="0.5"/>
      <rect y="42" width="50" height="2" fill="#00FF41" opacity="0.3" rx="0.5"/>
      <rect y="48" width="72" height="2" fill="#00FF41" opacity="0.5" rx="0.5"/>
      <rect y="54" width="30" height="2" fill="#00FF41" opacity="0.4" rx="0.5"/>
      <!-- Cursor -->
      <rect x="30" y="54" width="2" height="6" fill="#00FF41" opacity="0.8"/>
    </g>
  </g>

  <!-- Coffee mug (next to person) -->
  <g transform="translate(720, 720)">
    <rect x="0" y="0" width="22" height="26" rx="3" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="0.8"/>
    <path d="M 22,6 Q 32,6 32,14 Q 32,22 22,22" fill="none" stroke="#2A2A2A" stroke-width="0.8"/>
    <!-- Steam -->
    <path d="M 8,-5 Q 6,-15 10,-20" fill="none" stroke="#333333" stroke-width="0.5" opacity="0.3"/>
    <path d="M 14,-5 Q 16,-18 12,-25" fill="none" stroke="#333333" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Warm light on ground from fire -->
  <ellipse cx="340" cy="760" rx="120" ry="40" fill="#FF6B35" opacity="0.03"/>

  <!-- Bottom bar -->
  <rect x="0" y="1020" width="1080" height="60" fill="#0D0D0D" opacity="0.7"/>
  <text x="540" y="1055" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#444444" letter-spacing="6">CODE ANYWHERE. CLIMB EVERYTHING.</text>
</svg>